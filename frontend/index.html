<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Workspace | AI OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .message-bubble { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">
    <!-- Header -->
    <header class="glass-panel h-16 shrink-0 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/30">AI</div>
            <h1 class="font-semibold text-lg tracking-wide text-slate-200">Workspace OS</h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="newSessionBtn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 transition-colors rounded-md text-sm font-medium shadow-md">New Session</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar - Sessions -->
        <aside class="w-64 glass-panel border-r border-slate-700/50 flex flex-col hidden sm:flex shrink-0">
            <div class="p-4 border-b border-slate-700/50">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Active Sessions</h2>
            </div>
            <div id="sessionList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Session items injected here -->
            </div>
        </aside>

        <!-- Center - VNC Display -->
        <main class="flex-1 flex flex-col relative bg-slate-900 overflow-hidden">
            <div id="activeSessionBar" class="absolute top-0 inset-x-0 h-10 bg-slate-800/80 backdrop-blur z-10 flex items-center px-4 hidden">
                <span class="text-xs font-mono text-emerald-400 font-medium tracking-wider flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    LIVE VNC CONNECTION
                </span>
            </div>
            <div id="vncContainer" class="flex-1 w-full h-full flex items-center justify-center p-4">
                <div class="text-slate-500 flex flex-col items-center">
                    <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <p>Select or create a session to view the display</p>
                </div>
            </div>
        </main>

        <!-- Right Panel - Chat / Task Input -->
        <aside class="w-80 glass-panel border-l border-slate-700/50 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-700/50 shadow-sm z-10">
                <h2 class="text-sm font-semibold text-slate-200">Terminal & Chat</h2>
            </div>
            
            <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Chat messages -->
                <div class="text-center text-xs text-slate-500 my-4">No active session</div>
            </div>

            <div class="p-4 border-t border-slate-700/50 bg-slate-900/50">
                <form id="chatForm" class="flex flex-col gap-2 relative">
                    <textarea id="taskInput" rows="3" disabled class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-sm text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all disabled:opacity-50 resize-none" placeholder="Enter a task or instruction..."></textarea>
                    <button type="submit" disabled id="sendBtn" class="absolute bottom-2 right-2 p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-md transition-colors disabled:opacity-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
